<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PHLedger Agent</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0c10;
      color: #e5e7eb;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: #05060a;
      border-right: 1px solid #1f2933;
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .sidebar h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .sidebar small {
      color: #9ca3af;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-window {
      flex: 1;
      padding: 16px 24px;
      overflow-y: auto;
    }
    .message {
      max-width: 720px;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .user {
      background: #1f2933;
      align-self: flex-end;
    }
    .agent {
      background: #111827;
      border: 1px solid #1f2933;
      align-self: flex-start;
    }
    .input-bar {
      border-top: 1px solid #1f2933;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      box-sizing: border-box;
    }
    .input-bar textarea {
      flex: 1;
      resize: none;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      min-height: 48px;
      max-height: 120px;
    }
    .input-bar button {
      background: #4f46e5;
      border: none;
      color: white;
      padding: 0 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      min-width: 80px;
    }
    .input-bar button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>PHLedger</h1>
    <small>Local accounting agent</small>
    <div style="margin-top:16px;font-size:12px;color:#9ca3af;">
      Try prompts like:
      <ul>
        <li>draft BAS for AU company</li>
        <li>draft AU personal tax</li>
        <li>draft CA corporate tax</li>
        <li>show P&L summary</li>
      </ul>
    </div>
  </div>
  <div class="main">
    <div id="chat" class="chat-window"></div>
    <div class="input-bar">
      <textarea id="input" placeholder="Ask PHLedger about BAS, tax, or P&L..."></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, "user");
      inputEl.value = "";
      sendEl.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        if (!res.ok) {
          addMessage("Error: " + res.status + " " + res.statusText, "agent");
        } else {
          const data = await res.json();
          let msg = data.message || "";
          if (data.data) {
            msg += "\n\n" + JSON.stringify(data.data, null, 2);
          }
          addMessage(msg, "agent");
        }
      } catch (e) {
        addMessage("Network error: " + e.message, "agent");
      } finally {
        sendEl.disabled = false;
        inputEl.focus();
      }
    }

    sendEl.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage("Hi, I'm your local PHLedger agent. Ask me about BAS, AU/CA tax, or P&L.", "agent");
  </script>
</body>
</html>

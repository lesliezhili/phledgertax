name: Nightly Sync
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  bank-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Bank feed reconciliation
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
            const{isConnected}=require('./lib/agent/persistence');
            console.log('Supabase connected:', isConnected());
            console.log('Nightly sync complete at', new Date().toISOString());
          "
